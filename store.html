<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delight Dental & Medical Store | Professional Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --brand: #0d9488; --slate: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: var(--slate); scroll-behavior: smooth; }
        
        /* Fixed UI Layers */
        .sidebar-admin { background: white; border-right: 6px solid var(--brand); height: 100vh; position: fixed; left: 0; top: 0; width: 380px; z-index: 2000; display: none; box-shadow: 25px 0 60px rgba(0,0,0,0.1); }
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); z-index: 1500; display: none; backdrop-filter: blur(6px); }
        #auth-modal { z-index: 3000; }

        /* Buttons & Cards */
        .adm-btn { font-weight: 800; border-radius: 12px; border-bottom: 4px solid rgba(0,0,0,0.15); transition: 0.1s; cursor: pointer; text-align: center; font-size: 10px; padding: 12px; display: inline-block; width: 100%; text-transform: uppercase; }
        .adm-btn:active { border-bottom: 0; transform: translateY(2px); }
        .btn-green { background: #10b981 !important; color: white !important; border-color: #065f46; }
        .btn-blue { background: #2563eb !important; color: white !important; border-color: #1e40af; }
        .btn-neutral { background: #64748b !important; color: white !important; border-color: #334155; }
        .btn-wa { background: #25d366 !important; color: white !important; border-color: #128c7e; }

        .product-card { background: white; border: 2px solid #f1f5f9; border-radius: 24px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; height: 100%; position: relative; }
        .product-card:hover { border-color: var(--brand); transform: translateY(-4px); }
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .cat-btn { flex: 0 0 auto; padding: 10px 20px; background: white; border: 2px solid #e2e8f0; border-radius: 50px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .cat-btn.active { background: var(--brand); color: white; border-color: var(--brand); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="ui-overlay" class="overlay" onclick="closeAll()"></div>

<aside id="admin-sidebar" class="sidebar-admin overflow-y-auto p-8">
    <div class="flex justify-between items-center mb-8 border-b pb-6">
        <div>
            <h2 class="text-xl font-black uppercase">Admin Desk</h2>
            <p class="text-[9px] font-bold text-teal-600">Master Control</p>
        </div>
        <button onclick="closeAll()" class="text-xl bg-slate-100 w-10 h-10 rounded-full">✕</button>
    </div>

    <div class="space-y-6">
        <div class="p-5 bg-slate-50 border-2 border-slate-200 rounded-3xl">
            <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4">Branding</h3>
            <label class="adm-btn btn-neutral !w-auto px-4 cursor-pointer text-[9px]">
                Update Site Logo <input type="file" class="hidden" onchange="handleLogoUpload(this.files[0])">
            </label>
        </div>

        <div class="p-5 bg-white border-2 border-slate-100 rounded-3xl">
            <h3 class="text-[10px] font-black text-teal-600 uppercase mb-4 tracking-widest">Partner Approvals</h3>
            <div id="admin-merchants" class="space-y-4"></div>
        </div>

        <div class="p-5 bg-amber-50 border-2 border-amber-100 rounded-3xl">
            <h3 class="text-[10px] font-black text-amber-700 uppercase mb-4 tracking-widest">Pending Listings</h3>
            <div id="admin-products" class="space-y-3"></div>
        </div>
    </div>
</aside>

<nav class="bg-white border-b-4 border-teal-600 sticky top-0 z-[1000] py-4 px-6 shadow-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
            <img id="main-logo" src="https://via.placeholder.com/40?text=LOGO" class="w-10 h-10 rounded-xl border object-cover">
            <div>
                <h1 class="text-lg font-black text-slate-900 uppercase leading-none">Delight Dental</h1>
                <p class="text-[9px] font-black text-teal-600 uppercase mt-0.5">Medical Store</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="logged-in-ui" class="hidden flex items-center gap-4">
                <button id="admin-btn" onclick="openAdmin()" class="hidden adm-btn btn-neutral !w-auto !py-2 px-6">Admin Panel</button>
                <button onclick="location.reload()" class="text-[10px] font-black text-red-500 uppercase underline">Logout</button>
            </div>
            <button id="auth-trigger" onclick="openAuth()" class="adm-btn btn-green !w-auto px-8">Portal Access</button>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 mt-8">
    <div class="relative bg-white p-1 rounded-2xl border-2 border-slate-100 flex items-center gap-3 mb-8 shadow-sm">
        <span class="ml-4">🔍</span>
        <input type="text" id="site-search" placeholder="Search for equipment..." class="w-full p-4 outline-none font-semibold text-slate-600" onkeyup="doSearch(this.value)">
    </div>

    <div class="cat-scroll scrollbar-hide mb-4">
        <button class="cat-btn active" onclick="filterBy('All', this)">All Supply</button>
        <button class="cat-btn" onclick="filterBy('dental equipments', this)">Equipments</button>
        <button class="cat-btn" onclick="filterBy('filling materials', this)">Materials</button>
        <button class="cat-btn" onclick="filterBy('consumables', this)">Consumables</button>
    </div>

    <main id="partner-panel" class="mb-12 hidden">
        <div class="bg-white rounded-[2.5rem] p-8 border-2 border-teal-100 shadow-xl">
            <h2 class="text-xl font-black mb-6 uppercase">Post Equipment</h2>
            <form id="listing-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <input type="text" id="f-name" placeholder="Product Name" class="w-full p-4 bg-slate-50 border rounded-xl outline-none" required>
                    <select id="f-cat" class="w-full p-4 bg-slate-50 border rounded-xl font-bold">
                        <option value="dental equipments">Dental Equipments</option>
                        <option value="filling materials">Filling Materials</option>
                        <option value="consumables">Consumables</option>
                    </select>
                    <input type="number" id="f-price" placeholder="Price (₦)" class="w-full p-4 bg-slate-50 border rounded-xl outline-none" required>
                    <textarea id="f-desc" placeholder="Details..." class="w-full p-4 bg-slate-50 border rounded-xl h-24 outline-none" required></textarea>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-4 gap-2">
                        <label class="bg-slate-100 aspect-square rounded-xl border-2 border-dashed flex items-center justify-center cursor-pointer"><input type="file" class="hidden img-slot" onchange="this.parentElement.style.borderColor='#0d9488'">+</label>
                        <label class="bg-slate-100 aspect-square rounded-xl border-2 border-dashed flex items-center justify-center cursor-pointer"><input type="file" class="hidden img-slot" onchange="this.parentElement.style.borderColor='#0d9488'">+</label>
                        <label class="bg-slate-100 aspect-square rounded-xl border-2 border-dashed flex items-center justify-center cursor-pointer"><input type="file" class="hidden img-slot" onchange="this.parentElement.style.borderColor='#0d9488'">+</label>
                        <label class="bg-slate-100 aspect-square rounded-xl border-2 border-dashed flex items-center justify-center cursor-pointer"><input type="file" class="hidden img-slot" onchange="this.parentElement.style.borderColor='#0d9488'">+</label>
                    </div>
                    <button type="submit" class="adm-btn btn-green !py-5">Submit for Review</button>
                </div>
            </form>
        </div>
    </main>

    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 py-12"></div>
</div>

<div id="auth-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm p-10 rounded-[2.5rem] border-4 border-teal-500 shadow-2xl relative">
        <button onclick="closeAll()" class="absolute top-6 right-6 font-bold">✕</button>
        
        <div id="login-form">
            <h2 class="text-2xl font-black mb-8 text-center uppercase">Portal Login</h2>
            <input type="text" id="l-user" placeholder="Username" class="w-full p-4 bg-slate-50 border-2 rounded-xl mb-3 outline-none font-bold">
            <input type="password" id="l-pass" placeholder="Password" class="w-full p-4 bg-slate-50 border-2 rounded-xl mb-6 outline-none font-bold">
            <button onclick="handleLogin()" class="adm-btn btn-green !py-4">Sign In</button>
            <p onclick="toggleView(true)" class="text-center mt-6 text-[10px] font-black text-teal-600 underline cursor-pointer uppercase">New Clinic Registration</p>
        </div>

        <div id="reg-form" class="hidden">
            <h2 class="text-xl font-black mb-6 uppercase">Register</h2>
            <div class="space-y-3">
                <input type="text" id="r-user" placeholder="Business Name" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                <input type="email" id="r-email" placeholder="Email" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                <input type="number" id="r-wa" placeholder="WhatsApp Number" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                <input type="password" id="r-pass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                <button onclick="handleReg()" class="adm-btn btn-green !py-4 uppercase mt-2">Submit</button>
                <p onclick="toggleView(false)" class="text-center mt-4 text-[10px] font-bold text-slate-400 cursor-pointer">Back to Login</p>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://kwwfmkyopczqbhvvbvud.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3d2Zta3lvcGN6cWJodnZidnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjEzNTIsImV4cCI6MjA4ODM5NzM1Mn0.Wnq9Uv8ZvGmrkLkGIE6BtTHRsp8gg3xiI0W88rIdBwo";
    const _sb = supabase.createClient(SB_URL, SB_KEY);
    const MASTER_KEY = "mubsbatir";
    let currentUser = null, activeCat = 'All';

    // Logo & Visual Refresh
    function loadBranding() {
        const logo = localStorage.getItem('delight_logo') || "https://via.placeholder.com/40?text=DELIGHT";
        document.getElementById('main-logo').src = logo;
    }
    loadBranding();

    async function handleLogoUpload(file) {
        const path = `branding/logo_${Date.now()}.png`;
        const { error } = await _sb.storage.from('product-images').upload(path, file);
        if(!error) {
            const { data } = _sb.storage.from('product-images').getPublicUrl(path);
            localStorage.setItem('delight_logo', data.publicUrl);
            loadBranding();
        }
    }

    // Modal Control
    function openAuth() { 
        document.getElementById('ui-overlay').style.display = 'block';
        document.getElementById('auth-modal').style.display = 'flex'; 
    }
    function openAdmin() {
        document.getElementById('ui-overlay').style.display = 'block';
        document.getElementById('admin-sidebar').style.display = 'block';
        loadAdminData();
    }
    function closeAll() {
        document.querySelectorAll('.overlay, #auth-modal, #admin-sidebar').forEach(el => el.style.display = 'none');
    }
    function toggleView(isReg) {
        document.getElementById('login-form').classList.toggle('hidden', isReg);
        document.getElementById('reg-form').classList.toggle('hidden', !isReg);
    }

    // Auth Actions
    async function handleLogin() {
        const u = document.getElementById('l-user').value, p = document.getElementById('l-pass').value;
        if(p === MASTER_KEY) currentUser = { username: "Admin", role: "admin" };
        else {
            const { data } = await _sb.from('merchants').select('*').eq('username', u).single();
            if(data && data.pass === p) {
                if(data.status !== 'active') return alert("Access pending admin verification.");
                currentUser = data;
            } else return alert("Invalid Username/Password");
        }
        closeAll();
        document.getElementById('auth-trigger').style.display = 'none';
        document.getElementById('logged-in-ui').classList.remove('hidden');
        document.getElementById('partner-panel').classList.remove('hidden');
        if(currentUser.role === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
        renderGrid();
    }

    async function handleReg() {
        const u = document.getElementById('r-user').value, e = document.getElementById('r-email').value,
              w = document.getElementById('r-wa').value, p = document.getElementById('r-pass').value;
        await _sb.from('merchants').insert([{ username:u, email:e, whatsapp:w, pass:p, status:'pending' }]);
        alert("Success! Admin review started."); location.reload();
    }

    // Main Content
    async function renderGrid() {
        const { data: products } = await _sb.from('products').select('*').order('created_at', { ascending: false });
        const grid = document.getElementById('product-grid'); grid.innerHTML = "";
        
        for (let p of products) {
            const isAdmin = currentUser?.role === 'admin';
            if(activeCat !== 'All' && p.category !== activeCat) continue;
            if(p.status !== 'active' && !isAdmin && p.owner !== currentUser?.username) continue;

            const { data: m } = await _sb.from('merchants').select('*').eq('username', p.owner).single();
            const img = p.images[0] || "https://via.placeholder.com/300";
            
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${img}" class="w-full h-52 object-contain bg-white p-4">
                    <div class="p-6 flex-grow flex flex-col">
                        <span class="text-[8px] font-black text-teal-600 uppercase mb-2">${p.category}</span>
                        <h3 class="text-sm font-black uppercase mb-4">${p.name}</h3>
                        <div class="mt-auto">
                            <span class="text-xl font-black block mb-4">₦${p.price.toLocaleString()}</span>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="lead('${m?.whatsapp}','${p.name}','${p.id}','wa')" class="adm-btn btn-wa">WhatsApp</button>
                                <button onclick="lead('${m?.whatsapp}','${p.name}','${p.id}','call')" class="adm-btn btn-blue">Call</button>
                            </div>
                        </div>
                        ${isAdmin ? `<button onclick="admOp('products','${p.id}',{status:'active'})" class="mt-4 text-[8px] font-bold text-teal-600 underline uppercase">Approve Listing</button>` : ''}
                    </div>
                </div>`;
        }
    }

    async function lead(num, name, id, type) {
        await _sb.rpc('increment_leads', { row_id: id });
        const clean = num.replace(/\D/g, '');
        if(type === 'call') window.location.href = `tel:+${clean}`;
        else window.open(`https://wa.me/${clean}?text=Inquiry: ${name}`);
    }

    // Admin Panel Logic
    async function admOp(tbl, id, val) {
        const col = tbl === 'merchants' ? 'username' : 'id';
        await _sb.from(tbl).update(val).eq(col, id);
        loadAdminData(); renderGrid();
    }

    async function loadAdminData() {
        const { data: u } = await _sb.from('merchants').select('*');
        const { data: p } = await _sb.from('products').select('*').eq('status', 'pending');
        
        const uBox = document.getElementById('admin-merchants'); uBox.innerHTML = "";
        u?.forEach(m => {
            uBox.innerHTML += `
                <div class="p-4 bg-slate-50 border rounded-2xl">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[10px] font-black">${m.username}</p>
                        <span class="text-[7px] font-bold bg-slate-200 px-1 rounded uppercase">${m.status}</span>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <button onclick="admOp('merchants','${m.username}',{status:'active'})" class="text-teal-600 text-[8px] font-bold underline">APPROVE</button>
                        <button onclick="admOp('merchants','${m.username}',{status:'locked'})" class="text-red-500 text-[8px] font-bold underline">LOCK</button>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${m.whatsapp}" class="adm-btn btn-blue !py-2 !text-[7px]">Call</a>
                        <a href="mailto:${m.email}" class="adm-btn btn-neutral !py-2 !text-[7px]">Email</a>
                    </div>
                </div>`;
        });

        const pBox = document.getElementById('admin-products'); pBox.innerHTML = "";
        p?.forEach(itm => {
            pBox.innerHTML += `<div class="bg-white p-3 rounded-xl border flex justify-between items-center text-[9px] font-black uppercase">
                <span>${itm.name}</span>
                <button onclick="admOp('products','${itm.id}',{status:'active'})" class="text-teal-600 underline">APPROVE</button>
            </div>`;
        });
    }

    // Upload Logic
    document.getElementById('listing-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        let images = [];
        for (let input of document.querySelectorAll('.img-slot')) {
            if(input.files[0]) {
                const path = `products/${Date.now()}_${Math.random().toString(36).substring(7)}.png`;
                const { error } = await _sb.storage.from('product-images').upload(path, input.files[0]);
                if(!error) images.push(_sb.storage.from('product-images').getPublicUrl(path).data.publicUrl);
            }
        }
        await _sb.from('products').insert([{
            name: document.getElementById('f-name').value, category: document.getElementById('f-cat').value,
            price: parseFloat(document.getElementById('f-price').value), description: document.getElementById('f-desc').value,
            images: images, owner: currentUser.username, status: 'pending'
        }]);
        alert("Sent for review!"); location.reload();
    });

    function filterBy(cat, btn) {
        activeCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); renderGrid();
    }
    function doSearch(val) {
        const t = val.toLowerCase();
        document.querySelectorAll('.product-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(t) ? 'flex' : 'none');
    }

    renderGrid();
</script>
</body>
</html>
